<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Открытка</title>
  <link rel="stylesheet" href="/stylesheet/style.css">
</head>
<body>

  <div id="app">

    <div id="controls-panel">

      <div id="header">Сироткин</div>

      <div id="form">

        <div class="field">
          <div class="label">Город?</div>
          <input id="city" type="text"
                 placeholder="Ярославль"
                 autocomplete="off" spellcheck="false">
        </div>

        <div class="field">
          <div class="label">Адрес?</div>
          <input id="street" type="text"
                 placeholder="Рождественская улица, 19"
                 autocomplete="off" spellcheck="false">
        </div>

        <div class="field">
          <div class="label">Года?</div>
          <div id="year-row">
            <input id="year-from" type="number"
                   placeholder="1900" min="1826" max="2000">
            <span id="year-dash">— — — —</span>
            <input id="year-to" type="number"
                   placeholder="1980" min="1826" max="2000">
          </div>
        </div>

        <div id="status"></div>

        <button id="search-btn">☞ Напечатать</button>

      </div>

      <div id="footer">Неистовый тур</div>

    </div>

  </div>

  <div id="hidden-canvas" style="display:none;"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="sketch.js"></script>

</body>
</html>
